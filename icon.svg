<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35"/>
      <stop offset="100%" style="stop-color:#F7931E"/>
    </linearGradient>
    <linearGradient id="cartGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF"/>
      <stop offset="100%" style="stop-color:#F0E8E0"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#00000030"/>
    </filter>
    <filter id="innerGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect x="16" y="16" width="480" height="480" rx="110" ry="110" fill="url(#bgGrad)"/>

  <!-- Subtle inner highlight -->
  <rect x="16" y="16" width="480" height="240" rx="110" ry="110" fill="white" opacity="0.12"/>

  <!-- Cart group -->
  <g filter="url(#shadow)" transform="translate(256, 248)">
    <!-- Cart handle -->
    <line x1="-145" y1="-72" x2="-110" y2="-72" stroke="white" stroke-width="22" stroke-linecap="round"/>

    <!-- Cart body -->
    <path d="M-110,-72 L-88,68 C-85,82 -73,92 -58,92 L108,92 C123,92 135,82 138,68 L160,-30 L-98,-30"
          fill="none" stroke="white" stroke-width="22" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Cart cross bar -->
    <line x1="-98" y1="-30" x2="160" y2="-30" stroke="white" stroke-width="22" stroke-linecap="round"/>

    <!-- Wheels -->
    <circle cx="-50" cy="128" r="24" fill="none" stroke="white" stroke-width="18"/>
    <circle cx="-50" cy="128" r="6" fill="white"/>
    <circle cx="95" cy="128" r="24" fill="none" stroke="white" stroke-width="18"/>
    <circle cx="95" cy="128" r="6" fill="white"/>

    <!-- Plus/add badge -->
    <circle cx="140" cy="-75" r="42" fill="#FF3D57"/>
    <circle cx="140" cy="-75" r="42" fill="white" opacity="0.15"/>
    <line x1="140" y1="-95" x2="140" y2="-55" stroke="white" stroke-width="12" stroke-linecap="round"/>
    <line x1="120" y1="-75" x2="160" y2="-75" stroke="white" stroke-width="12" stroke-linecap="round"/>
  </g>
</svg>
